{% extends "base.html" %}

{% block title %}Accedi — EventHub{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body">
                    <h1 class="card-title h3 mb-3">Accedi</h1>

                    {% if form.errors %}
                        <div class="alert alert-danger">Username o password non corretti.</div>
                    {% endif %}

                    <form method="post" novalidate>
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary w-100">Accedi</button>
                    </form>

                    <p class="mt-3 mb-0">Non hai un account? <a href="{% url 'signup' %}">Registrati</a></p>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
