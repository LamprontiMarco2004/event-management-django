{% extends "base.html" %}

{% block title %}Registrati — EventHub{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body">
                    <h1 class="card-title h3 mb-3">Crea un account</h1>

                    <form method="post" novalidate>
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary w-100">Registrati</button>
                    </form>

                    <p class="mt-3 mb-0">Hai già un account? <a href="{% url 'login' %}">Accedi</a></p>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
