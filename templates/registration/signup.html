{% extends "base.html" %}

{% block title %}Registrati — EventHub{% endblock %}

{% block content %}
    <h1>Crea un account</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Registrati</button>
    </form>

    <p>Hai già un account? <a href="{% url 'login' %}">Accedi</a></p>
{% endblock %}
